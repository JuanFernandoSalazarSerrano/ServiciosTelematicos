global
    log /dev/log local0 info
    maxconn 256

defaults
    mode http
    log global
    option httplog

    timeout connect 5s
    timeout client 50s
    timeout server 50s

frontend http-in
    bind *:80

    log global
    log-format {"client_ip":"%ci","frontend":"%ft","backend":"%b","server":"%s","status":%ST,"request":"%r"}

    default_backend servers

frontend stats
    bind *:8404
    option httpclose

    http-request use-service prometheus-exporter if { path /metrics }

    stats enable
    stats uri /stats
    stats refresh 10s

backend servers
    balance roundrobin

    option httpchk GET /api/health
    http-check expect status 200

    server server1 127.0.0.1:8000 check
    server server2 127.0.0.1:8001 check
    server server3 127.0.0.1:8002 check

